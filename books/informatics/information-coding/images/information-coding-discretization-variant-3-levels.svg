<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Дискретизация по уровням</title>
  <desc id="desc">Непрерывное значение округляется до ближайшего доступного уровня, который затем записывается кодом.</desc>
  <style>
    .label{font:600 16px Arial,sans-serif;fill:#1f2933}
    .small{font:14px Arial,sans-serif;fill:#4b5563}
    .mono{font:600 14px Consolas,monospace;fill:#095aa6}
    .axis{stroke:#94a3b8;stroke-width:2}
    .level{stroke:#d8dee7;stroke-width:1}
    .curve{fill:none;stroke:#095aa6;stroke-width:4;stroke-linecap:round}
    .step{fill:none;stroke:#2e7d32;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    .dot{fill:#2e7d32;stroke:#ffffff;stroke-width:3}
    .card{fill:#f8fff8;stroke:#cfe2cf;stroke-width:1.5;rx:14}
    .badge{fill:#eaf5ea;stroke:#b9d4b9;rx:8}
  </style>
  <rect width="760" height="300" fill="#ffffff"/>
  <rect x="24" y="24" width="712" height="252" class="card"/>

  <text x="48" y="58" class="label">Непрерывные значения</text>
  <text x="48" y="84" class="small">между двумя уровнями есть бесконечно много вариантов</text>
  <line x1="58" y1="226" x2="330" y2="226" class="axis"/>
  <line x1="58" y1="82" x2="58" y2="232" class="axis"/>
  <g>
    <line x1="58" y1="198" x2="330" y2="198" class="level"/>
    <line x1="58" y1="170" x2="330" y2="170" class="level"/>
    <line x1="58" y1="142" x2="330" y2="142" class="level"/>
    <line x1="58" y1="114" x2="330" y2="114" class="level"/>
  </g>
  <path d="M64 204 C100 146, 132 129, 162 156 C196 187, 224 106, 260 122 C292 136, 304 178, 326 136" class="curve"/>

  <text x="410" y="58" class="label">После округления</text>
  <text x="410" y="84" class="small">оставляем только доступные уровни</text>
  <line x1="420" y1="226" x2="704" y2="226" class="axis"/>
  <line x1="420" y1="82" x2="420" y2="232" class="axis"/>
  <g>
    <line x1="420" y1="198" x2="704" y2="198" class="level"/>
    <line x1="420" y1="170" x2="704" y2="170" class="level"/>
    <line x1="420" y1="142" x2="704" y2="142" class="level"/>
    <line x1="420" y1="114" x2="704" y2="114" class="level"/>
  </g>
  <path d="M428 198 H468 V142 H508 V170 H548 V198 H588 V114 H628 V142 H668 V170 H696" class="step"/>
  <g>
    <circle cx="428" cy="198" r="6" class="dot"/>
    <circle cx="468" cy="142" r="6" class="dot"/>
    <circle cx="508" cy="170" r="6" class="dot"/>
    <circle cx="548" cy="198" r="6" class="dot"/>
    <circle cx="588" cy="114" r="6" class="dot"/>
    <circle cx="628" cy="142" r="6" class="dot"/>
    <circle cx="668" cy="170" r="6" class="dot"/>
  </g>

  <rect x="438" y="246" width="226" height="28" class="badge"/>
  <text x="454" y="265" class="mono">1, 3, 2, 1, 4, 3, 2</text>
</svg>
