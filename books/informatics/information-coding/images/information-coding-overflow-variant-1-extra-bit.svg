<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" role="img" aria-labelledby="title desc">
  <title id="title">Переполнение: лишний разряд</title>
  <desc id="desc">Число 256 записывается девятью битами, но в разрядной сетке на один байт помещаются только восемь младших битов.</desc>
  <style>
    .label{font:600 17px Arial,sans-serif;fill:#1f2933}
    .small{font:14px Arial,sans-serif;fill:#4b5563}
    .mono{font:700 22px Consolas,monospace;fill:#1f2933}
    .card{fill:#fff8f8;stroke:#e6c6c6;stroke-width:1.5;rx:14}
    .bit{fill:#eef6ff;stroke:#b9d0ea;stroke-width:2;rx:8}
    .bit-over{fill:#ffe3e3;stroke:#c62828;stroke-width:2;rx:8}
    .frame{fill:none;stroke:#2e7d32;stroke-width:3;stroke-dasharray:8 6;rx:12}
    .green{fill:#2e7d32}
    .red{fill:#c62828}
    .arrow{fill:none;stroke:#095aa6;stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#095aa6"/>
    </marker>
  </defs>
  <rect width="760" height="300" fill="#ffffff"/>
  <rect x="24" y="24" width="712" height="252" class="card"/>

  <text x="48" y="60" class="label">256 требует 9 разрядов</text>
  <text x="48" y="86" class="small">но один байт хранит только 8 бит</text>

  <g transform="translate(48 118)">
    <rect x="0" y="0" width="48" height="48" class="bit-over"/>
    <text x="24" y="31" text-anchor="middle" class="mono red">1</text>
    <text x="24" y="72" text-anchor="middle" class="small red">лишний</text>

    <g transform="translate(66 0)">
      <rect x="-10" y="-10" width="420" height="68" class="frame"/>
      <text x="200" y="-18" text-anchor="middle" class="small green">разрядная сетка: 8 бит</text>
      <rect x="0" y="0" width="48" height="48" class="bit"/>
      <rect x="52" y="0" width="48" height="48" class="bit"/>
      <rect x="104" y="0" width="48" height="48" class="bit"/>
      <rect x="156" y="0" width="48" height="48" class="bit"/>
      <rect x="208" y="0" width="48" height="48" class="bit"/>
      <rect x="260" y="0" width="48" height="48" class="bit"/>
      <rect x="312" y="0" width="48" height="48" class="bit"/>
      <rect x="364" y="0" width="48" height="48" class="bit"/>
      <text x="24" y="31" text-anchor="middle" class="mono">0</text>
      <text x="76" y="31" text-anchor="middle" class="mono">0</text>
      <text x="128" y="31" text-anchor="middle" class="mono">0</text>
      <text x="180" y="31" text-anchor="middle" class="mono">0</text>
      <text x="232" y="31" text-anchor="middle" class="mono">0</text>
      <text x="284" y="31" text-anchor="middle" class="mono">0</text>
      <text x="336" y="31" text-anchor="middle" class="mono">0</text>
      <text x="388" y="31" text-anchor="middle" class="mono">0</text>
    </g>
  </g>

  <path d="M560 144 H650" class="arrow"/>
  <text x="590" y="116" class="small">старший бит</text>
  <text x="590" y="136" class="small">не помещается</text>

  <g transform="translate(50 236)">
    <text x="0" y="0" class="mono">100000000</text>
    <text x="160" y="0" class="small">если оставить 8 младших битов:</text>
    <text x="410" y="0" class="mono green">00000000</text>
  </g>
</svg>
